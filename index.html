<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>瑞克奇 Rikkche | 點歌歌單</title>
    <style>
        :root {
            --bg-color: #f4f6f9;
            --card-bg: rgba(255, 255, 255, 0.85);
            --primary-color: #4a90e2;
            --text-main: #333333;
            --text-sub: #666666;
            --accent-color: #ff6b6b;
            --border-radius: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(135deg, #e0eafc, #cfdef3);
            background-attachment: fixed;
            color: var(--text-main);
            padding: 20px 15px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2rem;
            color: #2c3e50;
            margin-bottom: 10px;
        }

        /* 搜尋與篩選區 */
        .search-box {
            background: var(--card-bg);
            padding: 15px;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            backdrop-filter: blur(5px);
            margin-bottom: 25px;
            display: flex;
            gap: 10px;
        }

        .search-box input {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .search-box input:focus {
            border-color: var(--primary-color);
        }

        /* 歌單列表：核心響應式 Grid 排版 */
        .song-grid {
            display: grid;
            grid-template-columns: 1fr; /* 預設手機版：一排 */
            gap: 15px;
        }

        /* 電腦與平板版：自動切換為兩排 */
        @media (min-width: 768px) {
            .song-grid {
                grid-template-columns: repeat(2, 1fr); /* 電腦版：兩排 */
                gap: 20px;
            }
        }

        /* 歌曲卡片樣式 */
        .song-card {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 18px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.5);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .song-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.08);
        }

        .song-info {
            flex: 1;
            padding-right: 10px;
        }

        .song-title {
            font-size: 1.15rem;
            font-weight: 600;
            color: #1a252f;
            margin-bottom: 6px;
        }

        .song-artist {
            font-size: 0.95rem;
            color: var(--text-sub);
        }

        .song-meta {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 6px;
            min-width: 80px;
        }

        .badge {
            font-size: 0.75rem;
            padding: 4px 8px;
            border-radius: 20px;
            font-weight: bold;
            color: white;
        }

        .badge-lang { background-color: var(--primary-color); }
        .badge-key { background-color: #2ecc71; }
        
        .no-result {
            text-align: center;
            padding: 4px 0;
            color: var(--text-sub);
            grid-column: 1 / -1;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>瑞克奇 Rikkche 歌單列表</h1>
    </header>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="輸入歌名、歌手或語言進行搜尋...">
    </div>

    <div class="song-grid" id="songList">
        </div>
</div>

<script>
    let songs = [];

    // 從 LocalStorage 載入資料（與後台同步）
    function loadSongs() {
        const storedSongs = localStorage.getItem('rikkche_songlist');
        if (storedSongs) {
            songs = JSON.parse(storedSongs);
        } else {
            // 預設預覽資料
            songs = [
                { artist: "40mP", title: "戀愛裁判", lang: "日本語", key: "＋４", notes: "" },
                { artist: "米津玄師", title: "Lemon", lang: "日本語", key: "0", notes: "" }
            ];
        }
        renderSongs(songs);
    }

    // 渲染歌單到畫面上
    function renderSongs(data) {
        const listContainer = document.getElementById('songList');
        listContainer.innerHTML = '';

        if (data.length === 0) {
            listContainer.innerHTML = '<div class="no-result">沒有找到相符的歌曲喔！</div>';
            return;
        }

        data.forEach(song => {
            const card = document.createElement('div');
            card.className = 'song-card';
            
            // 處理備註是否有翻車或特殊標記
            const noteHtml = song.notes ? `<div style="font-size:0.8rem; color:var(--accent-color); margin-top:4px;">${song.notes}</div>` : '';

            card.innerHTML = `
                <div class="song-info">
                    <div class="song-title">${song.title}</div>
                    <div class="song-artist">${song.artist} ${noteHtml}</div>
                </div>
                <div class="song-meta">
                    <span class="badge badge-lang">${song.lang || '未知'}</span>
                    ${song.key ? `<span class="badge badge-key">${song.key}</span>` : ''}
                </div>
            `;
            listContainer.appendChild(card);
        });
    }

    // 搜尋功能
    document.getElementById('searchInput').addEventListener('input', function(e) {
        const keyword = e.target.value.toLowerCase().trim();
        const filtered = songs.filter(song => 
            song.title.toLowerCase().includes(keyword) || 
            song.artist.toLowerCase().includes(keyword) || 
            (song.lang && song.lang.toLowerCase().includes(keyword))
        );
        renderSongs(filtered);
    });

    // 初始化監聽 LocalStorage 變化（若後台在同瀏覽器更新，前台會即時重載）
    window.addEventListener('storage', function(e) {
        if (e.key === 'rikkche_songlist') {
            loadSongs();
        }
    });

    // 首次載入
    loadSongs();
</script>
</body>
</html>
