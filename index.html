<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Songlist</title>
    <style>
        body { 
            margin: 0; 
            padding: 40px 20px; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 50%, #f85032 100%);
            min-height: 100vh;
            color: #1e293b;
        }

        .container { 
            max-width: 750px; 
            margin: 0 auto; 
            background: rgba(255, 255, 255, 0.96); 
            padding: 40px; 
            border-radius: 8px; 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15); 
        }

        .toolbar {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
        }
        .search-box { 
            flex: 2; 
            padding: 12px 16px; 
            font-size: 16px; 
            border: 1px solid #cbd5e1; 
            border-radius: 4px; 
            box-sizing: border-box; 
            outline: none; 
            transition: border-color 0.2s; 
            color: #1e293b;
        }
        .filter-select {
            flex: 1; 
            padding: 12px 16px;
            font-size: 16px;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            box-sizing: border-box;
            outline: none;
            background-color: #ffffff;
            color: #1e293b;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .search-box:focus, .filter-select:focus { 
            border-color: #3a7bd5; 
        }

        .song-list { 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
        }
        .song-card { 
            background: #ffffff; 
            padding: 16px 20px; 
            border-radius: 6px; 
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04); 
            border: 1px solid #e2e8f0;
        }

        .song-main-info { 
            display: flex; 
            align-items: center; 
            flex-wrap: wrap;
            gap: 12px;
        }

        .tag { 
            display: inline-block;
            padding: 4px 10px; 
            border-radius: 4px; 
            font-size: 13px; 
            font-weight: bold; 
            color: #ffffff; 
            text-align: center;
            min-width: 40px;
        }
        .tag-日文 { background-color: #f1c40f; color: #000000; } 
        .tag-英文 { background-color: #e91e63; } 
        .tag-中文 { background-color: #00bcd4; } 
        .tag-台語 { background-color: #1b5e20; } 
        .tag-其他 { background-color: #000000; } 

        .song-title { 
            font-size: 18px; 
            font-weight: 700; 
            color: #0f172a;
        }
        .song-author { 
            font-size: 16px; 
            color: #475569; 
            margin-left: 4px;
        }

        .song-note { 
            font-size: 13px; 
            color: #94a3b8; 
            margin-top: 8px; 
            padding-top: 6px;
            border-top: 1px dashed #f1f5f9;
        }

        .status-msg { 
            text-align: center; 
            color: #64748b; 
            padding: 30px; 
            font-size: 16px; 
        }
    </style>
</head>
<body>

<div class="container">
    <div class="toolbar">
        <input type="text" id="searchInp" class="search-box" placeholder="搜尋歌名或原唱..." oninput="filterSongs()">
        <select id="langFilter" class="filter-select" onchange="filterSongs()">
            <option value="全部">全部語言</option>
            <option value="日文">日文</option>
            <option value="英文">英文</option>
            <option value="中文">中文</option>
            <option value="台語">台語</option>
            <option value="其他">其他</option>
        </select>
    </div>

    <div id="userSongList" class="song-list">
        <div class="status-msg">歌單載入中...</div>
    </div>
</div>

<script>
    let allSongs = []; 

    async function loadSongs() {
        try {
            // 使用隨機數加上時間戳記，確保絕對不抓舊的快取
            const response = await fetch('songs.json?v=' + Math.random());
            if (!response.ok) throw new Error();
            allSongs = await response.json();
            renderSongs(allSongs);
        } catch (error) {
            document.getElementById('userSongList').innerHTML = '<div class="status-msg" style="color: #ef4444;">無法載入歌單，請確認 JSON 檔案是否存在。</div>';
        }
    }

    function renderSongs(songsToRender) {
        const listContainer = document.getElementById('userSongList');
        listContainer.innerHTML = '';

        if (!songsToRender || songsToRender.length === 0) {
            listContainer.innerHTML = '<div class="status-msg">未找到符合的歌曲</div>';
            return;
        }

        songsToRender.forEach(song => {
            const card = document.createElement('div');
            card.className = 'song-card';
            
            const noteHTML = song.note ? `<div class="song-note">${song.note}</div>` : '';
            // 同時防禦性讀取 author 或 artist 欄位
            const displayAuthor = song.author || song.artist || '';

            card.innerHTML = `
                <div class="song-main-info">
                    <span class="tag tag-${song.lang}">${song.lang}</span>
                    <span class="song-title">${song.title}</span>
                    <span class="song-author">${displayAuthor}</span>
                </div>
                ${noteHTML}
            `;
            listContainer.appendChild(card);
        });
    }

    function filterSongs() {
        const searchTerm = document.getElementById('searchInp').value.toLowerCase().trim();
        const selectedLang = document.getElementById('langFilter').value;

        const filtered = allSongs.filter(song => {
            const displayAuthor = song.author || song.artist || '';
            const matchesSearch = song.title.toLowerCase().includes(searchTerm) || 
                                  displayAuthor.toLowerCase().includes(searchTerm);
            
            const matchesLang = (selectedLang === '全部') || (song.lang === selectedLang);
            
            return matchesSearch && matchesLang;
        });

        renderSongs(filtered);
    }

    window.onload = loadSongs;
</script>
</body>
</html>
