<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Songlist</title>
    <style>
        /* 1. 全域設定與藍綠紅漸層背景 */
        body { 
            margin: 0; 
            padding: 40px 20px; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 50%, #f85032 100%);
            min-height: 100vh;
            color: #1e293b;
        }

        /* 2. 主容器 */
        .container { 
            max-width: 750px; 
            margin: 0 auto; 
            background: rgba(255, 255, 255, 0.96); 
            padding: 40px; 
            border-radius: 8px; 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15); 
        }

        /* 3. 工具列佈局 (搜尋框 + 篩選選單並排) */
        .toolbar {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
        }
        .search-box { 
            flex: 2; /* 讓搜尋框佔據較多空間 */
            padding: 12px 16px; 
            font-size: 16px; 
            border: 1px solid #cbd5e1; 
            border-radius: 4px; 
            box-sizing: border-box; 
            outline: none; 
            transition: border-color 0.2s; 
            color: #1e293b;
        }
        .filter-select {
            flex: 1; /* 篩選選單佔據較小空間 */
            padding: 12px 16px;
            font-size: 16px;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            box-sizing: border-box;
            outline: none;
            background-color: #ffffff;
            color: #1e293b;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .search-box:focus, .filter-select:focus { 
            border-color: #3a7bd5; 
        }

        /* 4. 歌曲列表與卡片 */
        .song-list { 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
        }
        .song-card { 
            background: #ffffff; 
            padding: 16px 20px; 
            border-radius: 6px; 
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04); 
            border: 1px solid #e2e8f0;
        }

        /* 5. 第一行：語言標籤 + 歌名 + 歌手 */
        .song-main-info { 
            display: flex; 
            align-items: center; 
            flex-wrap: wrap;
            gap: 12px;
        }

        /* 6. 獨立的語言標籤框 */
        .tag { 
            display: inline-block;
            padding: 4px 10px; 
            border-radius: 4px; 
            font-size: 13px; 
            font-weight: bold; 
            color: #ffffff; 
            text-align: center;
            min-width: 40px;
        }
        .tag-日文 { background-color: #f1c40f; color: #000000; } /* Y */
        .tag-英文 { background-color: #e91e63; } /* M */
        .tag-中文 { background-color: #00bcd4; } /* C */
        .tag-台語 { background-color: #1b5e20; } /* 深綠 */
        .tag-其他 { background-color: #000000; } /* K */

        .song-title { 
            font-size: 18px; 
            font-weight: 700; 
            color: #0f172a;
        }
        .song-author { 
            font-size: 16px; 
            color: #475569; 
            margin-left: 4px;
        }

        /* 7. 第二行：下方備註 (較小灰色字) */
        .song-note { 
            font-size: 13px; 
            color: #94a3b8; 
            margin-top: 8px; 
            padding-top: 6px;
            border-top: 1px dashed #f1f5f9;
        }

        /* 狀態提示文字 */
        .status-msg { 
            text-align: center; 
            color: #64748b; 
            padding: 30px; 
            font-size: 16px; 
        }
    </style>
</head>
<body>

<div class="container">
    <div class="toolbar">
        <input type="text" id="searchInp" class="search-box" placeholder="搜尋歌名或原唱..." oninput="filterSongs()">
        <select id="langFilter" class="filter-select" onchange="filterSongs()">
            <option value="全部">全部語言</option>
            <option value="日文">日文</option>
            <option value="英文">英文</option>
            <option value="中文">中文</option>
            <option value="台語">台語</option>
            <option value="其他">其他</option>
        </select>
    </div>
