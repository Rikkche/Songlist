<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生物歌單列表</title>
    <style>
        body { 
            margin: 0; 
            padding: 40px 20px; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 50%, #f85032 100%);
            min-height: 100vh;
            color: #1e293b;
        }

        .container { 
            max-width: 750px; 
            margin: 0 auto; 
            background: rgba(255, 255, 255, 0.96); 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15); 
        }

        .main-title {
            font-size: 28px;
            font-weight: 700;
            color: #0f172a;
            margin-top: 0;
            margin-bottom: 24px;
            letter-spacing: 1px;
            border-left: 5px solid #3a7bd5;
            padding-left: 12px;
            line-height: 1.2;
        }

        .toolbar {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 30px;
        }
        .search-box { 
            width: 100%;
            padding: 12px 16px; 
            font-size: 16px; 
            border: 1px solid #cbd5e1; 
            border-radius: 6px; 
            box-sizing: border-box; 
            outline: none; 
            transition: border-color 0.2s; 
            color: #1e293b;
        }
        .filter-group {
            display: flex;
            gap: 12px;
        }
        .filter-select {
            flex: 1; 
            padding: 12px 16px;
            font-size: 16px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            box-sizing: border-box;
            outline: none;
            background-color: #ffffff;
            color: #1e293b;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .search-box:focus, .filter-select:focus { 
            border-color: #3a7bd5; 
        }

        .song-list { 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
        }
        .song-card { 
            background: #ffffff; 
            padding: 16px 20px; 
            border-radius: 6px; 
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04); 
            border: 1px solid #e2e8f0;
        }

        .song-main-info { 
            display: flex; 
            align-items: center; 
            flex-wrap: wrap;
            gap: 8px;
        }

        /* 標籤樣式全包 */
        .tag { 
            display: inline-block;
            padding: 4px 10px; 
            border-radius: 4px; 
            font-size: 12px; 
            font-weight: bold; 
            color: #ffffff; 
            text-align: center;
        }
        .tag-日文 { background-color: #f1c40f; color: #000000; } 
        .tag-英文 { background-color: #e91e63; } 
        .tag-中文 { background-color: #00bcd4; } 
        .tag-台語 { background-color: #1b5e20; } 
        .tag-其他 { background-color: #000000; } 

        .custom-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            color: #ffffff;
        }

        .song-title { 
            font-size: 18px; 
            font-weight: 700; 
            color: #0f172a;
        }
        .song-author { 
            font-size: 16px; 
            color: #475569; 
            margin-left: 4px;
        }

        .song-note { 
            font-size: 13px; 
            color: #94a3b8; 
            margin-top: 8px; 
            padding-top: 6px;
            border-top: 1px dashed #f1f5f9;
        }

        .status-msg { 
            text-align: center; 
            color: #64748b; 
            padding: 30px; 
            font-size: 16px; 
        }
    </style>
</head>
<body>

<div class="container">
    <h1 class="main-title">生物歌單列表</h1>

    <div class="toolbar">
        <input type="text" id="searchInp" class="search-box" placeholder="搜尋歌名、原唱或標籤..." oninput="filterSongs()">
        <div class="filter-group">
            <select id="langFilter" class="filter-select" onchange="filterSongs()">
                <option value="全部">全部語言</option>
                <option value="日文">日文</option>
                <option value="英文">英文</option>
                <option value="中文">中文</option>
                <option value="台語">台語</option>
                <option value="其他">其他</option>
            </select>
            <select id="customTagFilter" class="filter-select" onchange="filterSongs()">
                <option value="全部">全部標籤</option>
            </select>
        </div>
    </div>

    <div id="userSongList" class="song-list">
        <div class="status-msg">歌單載入中...</div>
    </div>
</div>

<script>
    let allSongs = []; 

    async function loadSongs() {
        try {
            const response = await fetch('songs.json?v=' + Math.random());
            if (!response.ok) throw new Error();
            const rawData = await response.json();
            
            // 依歌手排序 (中英相容)
            allSongs = rawData.sort((a, b) => {
                const authorA = a.author || a.artist || '';
                const authorB = b.author || b.artist || '';
                return authorA.localeCompare(authorB, 'zh-TW');
            });

            generateTagFilterOptions(allSongs);
            renderSongs(allSongs);
        } catch (error) {
            document.getElementById('userSongList').innerHTML = '<div class="status-msg" style="color: #ef4444;">無法載入歌單。</div>';
        }
    }

    function generateTagFilterOptions(songs) {
        const tagSelect = document.getElementById('customTagFilter');
        const uniqueTagNames = new Set();
        songs.forEach(song => {
            if (song.tags && Array.isArray(song.tags)) {
                song.tags.forEach(t => uniqueTagNames.add(t.name));
            }
        });
        tagSelect.innerHTML = '<option value="全部">全部標籤</option>';
        uniqueTagNames.forEach(tagName => {
            const opt = document.createElement('option');
            opt.value = tagName;
            opt.innerText = tagName;
            tagSelect.appendChild(opt);
        });
    }

    function renderSongs(songsToRender) {
        const listContainer = document.getElementById('userSongList');
        listContainer.innerHTML = '';

        if (!songsToRender || songsToRender.length === 0) {
            listContainer.innerHTML = '<div class="status-msg">未找到符合的歌曲</div>';
            return;
        }

        songsToRender.forEach(song => {
            const card = document.createElement('div');
            card.className = 'song-card';
            
            const noteHTML = song.note ? `<div class="song-note">${song.note}</div>` : '';
            const displayAuthor = song.author || song.artist || '';

            // 生成「複數語言」的 HTML 框框
            let langsHTML = '';
            const langs = Array.isArray(song.langs) ? song.langs : (song.lang ? [song.lang] : []);
            langs.forEach(l => {
                langsHTML += `<span class="tag tag-${l}">${l}</span>`;
            });

            // 生成自訂標籤 HTML
            let tagsHTML = '';
            if(song.tags && Array.isArray(song.tags)) {
                song.tags.forEach(t => {
                    tagsHTML += `<span class="custom-badge" style="background-color: ${t.color}">${t.name}</span>`;
                });
            }

            card.innerHTML = `
                <div class="song-main-info">
                    ${langsHTML}
                    <span class="song-title">${song.title}</span>
                    <span class="song-author">${displayAuthor}</span>
                    ${tagsHTML}
                </div>
                ${noteHTML}
            `;
            listContainer.appendChild(card);
        });
    }

    function filterSongs() {
        const searchTerm = document.getElementById('searchInp').value.toLowerCase().trim();
        const selectedLang = document.getElementById('langFilter').value;
        const selectedTag = document.getElementById('customTagFilter').value;

        const filtered = allSongs.filter(song => {
            const displayAuthor = song.author || song.artist || '';
            const songLangs = Array.isArray(song.langs) ? song.langs : (song.lang ? [song.lang] : []);
            
            const hasMatchingTagKeyword = song.tags && Array.isArray(song.tags) && 
                song.tags.some(t => t.name.toLowerCase().includes(searchTerm));

            // 1. 關鍵字比對
            const matchesSearch = song.title.toLowerCase().includes(searchTerm) || 
                                  displayAuthor.toLowerCase().includes(searchTerm) ||
                                  hasMatchingTagKeyword;
            
            // 2. 複數語言比對：只要歌曲的多語系裡面包含了選中的語言即可
            const matchesLang = (selectedLang === '全部') || songLangs.includes(selectedLang);
            
            // 3. 標籤比對
            const matchesTag = (selectedTag === '全部') || 
                (song.tags && Array.isArray(song.tags) && song.tags.some(t => t.name === selectedTag));
            
            return matchesSearch && matchesLang && matchesTag;
        });

        renderSongs(filtered);
    }

    window.onload = loadSongs;
</script>
</body>
</html>
